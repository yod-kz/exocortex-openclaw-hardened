---
# Install and enable Tailscale VPN (Debian/Ubuntu)

- name: Add Tailscale GPG key
  shell:
    cmd: |
      set -o pipefail
      curl -fsSL "https://pkgs.tailscale.com/stable/{{ ansible_distribution | lower }}/{{ ansible_distribution_release }}.noarmor.gpg" | \
        tee /usr/share/keyrings/tailscale-archive-keyring.gpg > /dev/null
    creates: /usr/share/keyrings/tailscale-archive-keyring.gpg
    executable: /bin/bash

- name: Add Tailscale repository
  shell:
    cmd: |
      set -o pipefail
      curl -fsSL "https://pkgs.tailscale.com/stable/{{ ansible_distribution | lower }}/{{ ansible_distribution_release }}.tailscale-keyring.list" | \
        tee /etc/apt/sources.list.d/tailscale.list > /dev/null
    creates: /etc/apt/sources.list.d/tailscale.list
    executable: /bin/bash

- name: Update apt cache after adding Tailscale repo
  apt:
    update_cache: true

- name: Install Tailscale
  apt:
    name: tailscale
    state: present

- name: Enable Tailscale service
  systemd:
    name: tailscaled
    enabled: true
    state: started

- name: Check if Tailscale is connected
  command: tailscale status --json
  register: tailscale_status
  changed_when: false
  failed_when: false

- name: Display Tailscale connection instructions
  debug:
    msg: |
      Tailscale installed but not connected.
      Run: sudo tailscale up
      Or with auth key: sudo tailscale up --authkey tskey-auth-xxxxx
  when: tailscale_status.rc != 0
