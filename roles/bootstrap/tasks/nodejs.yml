---
# Install Node.js from NodeSource and pnpm from npm

- name: Install required packages for Node.js
  apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present

- name: Create directory for NodeSource GPG key
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Add NodeSource GPG key
  shell:
    cmd: |
      set -o pipefail
      curl -fsSL https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key | \
        gpg --dearmor -o /etc/apt/keyrings/nodesource.gpg
      chmod a+r /etc/apt/keyrings/nodesource.gpg
    creates: /etc/apt/keyrings/nodesource.gpg
    executable: /bin/bash

- name: Add NodeSource repository
  shell:
    cmd: |
      set -o pipefail
      echo "deb [signed-by=/etc/apt/keyrings/nodesource.gpg] \
        https://deb.nodesource.com/node_{{ bootstrap.nodejs_version }} nodistro main" | \
        tee /etc/apt/sources.list.d/nodesource.list > /dev/null
    creates: /etc/apt/sources.list.d/nodesource.list
    executable: /bin/bash

- name: Update apt cache after adding NodeSource repo
  apt:
    update_cache: true

- name: Install Node.js
  apt:
    name: nodejs
    state: present

- name: Check if pnpm is already installed
  command: pnpm --version
  register: pnpm_check
  failed_when: false
  changed_when: false

- name: Install pnpm globally
  command: npm install -g pnpm
  when: pnpm_check.rc != 0

- name: Verify Node.js and pnpm versions
  shell: "echo \"Node.js: $(node --version), pnpm: $(pnpm --version)\""
  register: versions
  changed_when: false

- name: Display versions
  debug:
    msg: "{{ versions.stdout }}"
