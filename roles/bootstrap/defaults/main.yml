---
# Bootstrap role defaults — Phase 1 system preparation
# These are deep-merged with site config in playbook pre_tasks.

_bootstrap_defaults:
  enabled: true

  # Installation mode for OpenClaw binary: "release" or "development"
  install_mode: "release"

  # Node.js major version (NodeSource)
  nodejs_version: "22.x"

  # Tailscale VPN (optional)
  tailscale_enabled: false
  tailscale_authkey: ""

  # System tools: install debugging/network/build packages
  system_tools: true

  # Development mode settings (only when install_mode: development)
  openclaw_repo_url: "https://github.com/openclaw/openclaw.git"
  openclaw_repo_branch: "main"

  # SSH authorized keys for the openclaw user (list of public key strings)
  ssh_keys: []

# User settings — used across bootstrap and other roles
openclaw_user: openclaw
openclaw_home: /home/openclaw
openclaw_config_dir: /home/openclaw/.openclaw
openclaw_code_dir: /home/openclaw/code
