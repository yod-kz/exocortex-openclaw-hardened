---
_locksmith_defaults:
  enabled: true
  version: "latest"
  install_method: "auto"  # auto, release, source, or existing
  release_repo: "SentientSwarm/agent-locksmith"
  daemon_binary_path: "/usr/local/bin/locksmithd"
  cli_binary_path: "/usr/local/bin/locksmith"
  # Deprecated compatibility alias for older site configs. New installs use
  # daemon_binary_path for services and cli_binary_path for operator commands.
  binary_path: "/usr/local/bin/locksmithd"
  source_dir: "{{ playbook_dir }}/../exocortex-agent-locksmith"
  source_build_dir: "/tmp/openclaw-locksmith-src"
  build_container_image: "rust:1-bookworm"
  build_with_docker: true
  listen_host: "127.0.0.1"
  listen_port: 9200
  admin_socket_path: ""
  operator_credentials_path: ""
  database_path: ""
  log_level: "info"
  inbound_token: ""
  oauth_sealing_key: ""
  env_files: []
  required: true
  generic_tool: false
  catalog_ttl_seconds: 30
  timeout_seconds: 30
  idle_timeout_seconds: 60
  max_response_bytes: 262144
  body_limit_bytes: 10485760
  prompt_catalog: true
  openclaw_base_url: ""
  audit:
    retention_days: 90
    sweep_interval_seconds: 3600
  shutdown:
    drain_window_seconds: 30
  kamiwaza:
    enabled: false
    api_url: ""
    api_url_candidates: []
    api_token: ""
    api_token_env: "KAMIWAZA_API_KEY"
    api_token_from_env: false
    tool_prefix: "kamiwaza"
    include_types: ["tool"]
    verify_tls: true
    cloud: false
    egress: "direct"
    timeout_seconds: 30
    projected_tools: []
  slack_native:
    enabled: true
    upstream: "https://slack.com/api"
    bot_tool_name: "slack-bot"
    app_tool_name: "slack-app"
    user_tool_name: "slack-user"
    bot_token: ""
    app_token: ""
    user_token: ""
    bot_token_env: "SLACK_BOT_TOKEN"
    app_token_env: "SLACK_APP_TOKEN"
    user_token_env: "SLACK_USER_TOKEN"
    include_user: false
    request_seconds: 60
    idle_seconds: 60
    body_limit_bytes: 10485760
  tools: []
