---
# Upgrades OpenClaw (if version changed) and manages the systemd service.

- name: Check for version upgrade
  include_tasks: upgrade.yml
  when: openclaw_version != "latest"

- name: Detect openclaw binary path
  shell: |
    for p in /home/openclaw/.local/bin/openclaw /home/linuxbrew/.linuxbrew/bin/openclaw /usr/local/bin/openclaw; do
      [ -x "$p" ] && echo "$p" && exit 0
    done
    exit 1
  register: openclaw_which
  changed_when: false
  failed_when: false
  check_mode: false

- name: Use detected or configured binary path
  set_fact:
    final_openclaw_binary: "{{ (openclaw_which.stdout | default('') | trim) if (openclaw_which.rc | default(1)) == 0 and (openclaw_which.stdout | default('') | trim) != '' else openclaw_binary }}"

- name: Verify openclaw binary exists
  stat:
    path: "{{ final_openclaw_binary }}"
  register: binary_check

- name: Fail if openclaw binary not found
  fail:
    msg: >
      OpenClaw binary not found at {{ final_openclaw_binary }}.
      Run 'openclaw onboard' as the openclaw user first.
  when: not binary_check.stat.exists

- name: Create OpenClaw service config directory
  file:
    path: /etc/openclaw
    state: directory
    owner: root
    group: openclaw
    mode: "0750"

- name: Write OpenClaw service environment
  template:
    src: openclaw.env.j2
    dest: /etc/openclaw/openclaw.env
    owner: root
    group: openclaw
    mode: "0640"
  notify:
    - restart openclaw
  no_log: true

- name: Write system-level openclaw service
  template:
    src: openclaw.service.j2
    dest: /etc/systemd/system/openclaw.service
    mode: "0644"
  notify:
    - reload systemd
    - restart openclaw

- name: Enable and start openclaw
  systemd:
    name: openclaw
    enabled: true
    state: started
    daemon_reload: true
