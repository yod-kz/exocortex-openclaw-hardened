---
- name: Collect unique agent state repos
  set_fact:
    _agent_repos: "{{ openclaw_agents | selectattr('state_repo', 'defined') | map(attribute='state_repo') | unique | list }}"

- name: Create state-repos directory
  file:
    path: "{{ openclaw_data_dir }}/state-repos"
    state: directory
    owner: openclaw
    group: openclaw
    mode: "0750"
  when: _agent_repos | length > 0

# Convert git@github.com:org/repo.git to https://github.com/org/repo.git
# so traffic routes through Pipelock (SSH egress is blocked by nftables).
# Authentication uses the GitHub token from vault via git credential helper.
- name: Convert SSH URLs to HTTPS
  set_fact:
    _agent_repos_https: >-
      {{ _agent_repos | map('regex_replace',
         '^git@github\.com:(.*)$',
         'https://github.com/\1') | list }}

- name: Configure git credential helper for clone
  copy:
    content: |
      #!/bin/sh
      case "$1" in
        Username*) echo "x-access-token" ;;
        Password*) echo "{{ vault_github_token }}" ;;
      esac
    dest: "{{ openclaw_data_dir }}/state-repos/.git-credential-helper"
    owner: openclaw
    group: openclaw
    mode: "0700"
  when: _agent_repos | length > 0 and vault_github_token | default('') != ''
  no_log: true

- name: Clone agent state repos
  command: >
    git -c http.proxy=http://{{ pipelock.listen }} clone
    --branch main --single-branch
    {{ item }}
    {{ openclaw_data_dir }}/state-repos/{{ item | hash('md5') }}
  args:
    creates: "{{ openclaw_data_dir }}/state-repos/{{ item | hash('md5') }}"
  become_user: openclaw
  environment:
    GIT_ASKPASS: "{{ openclaw_data_dir }}/state-repos/.git-credential-helper"
  loop: "{{ _agent_repos_https }}"

- name: Remove credential helper
  file:
    path: "{{ openclaw_data_dir }}/state-repos/.git-credential-helper"
    state: absent

- name: Create per-agent directories
  file:
    path: "{{ openclaw_data_dir }}/agents/{{ item.id }}"
    state: directory
    owner: openclaw
    group: openclaw
    mode: "0750"
  loop: "{{ openclaw_agents }}"
  when: item.state_repo is defined

# Symlinks use the HTTPS URL hash (not SSH) since that's what we cloned with
- name: Build repo URL map (SSH → HTTPS hash)
  set_fact:
    _repo_hash_map: >-
      {{ dict(_agent_repos | zip(_agent_repos_https | map('hash', 'md5') | list)) }}

- name: Link agent workspaces
  file:
    src: "{{ openclaw_data_dir }}/state-repos/{{ _repo_hash_map[item.state_repo] }}/{{ item.state_path }}/workspace"
    dest: "{{ openclaw_data_dir }}/agents/{{ item.id }}/workspace"
    state: link
    owner: openclaw
    group: openclaw
  loop: "{{ openclaw_agents }}"
  when: item.state_repo is defined and item.state_path is defined

- name: Check for shared knowledge directory
  stat:
    path: "{{ openclaw_data_dir }}/state-repos/{{ _agent_repos_https[0] | hash('md5') }}/shared"
  register: _shared_dir
  when: _agent_repos | length > 0

- name: Link shared knowledge
  file:
    src: "{{ openclaw_data_dir }}/state-repos/{{ _agent_repos_https[0] | hash('md5') }}/shared"
    dest: "{{ openclaw_data_dir }}/shared"
    state: link
    owner: openclaw
    group: openclaw
  when: _agent_repos | length > 0 and _shared_dir.stat.exists | default(false)

- name: Check for memory directory
  stat:
    path: "{{ openclaw_data_dir }}/state-repos/{{ _repo_hash_map[item.state_repo] }}/{{ item.state_path }}/memory"
  register: _memory_dirs
  loop: "{{ openclaw_agents }}"
  when: item.state_repo is defined

- name: Link agent memory directories
  file:
    src: "{{ openclaw_data_dir }}/state-repos/{{ _repo_hash_map[item.item.state_repo] }}/{{ item.item.state_path }}/memory"
    dest: "{{ openclaw_data_dir }}/agents/{{ item.item.id }}/memory"
    state: link
    owner: openclaw
    group: openclaw
  loop: "{{ _memory_dirs.results }}"
  when: item.stat is defined and item.stat.exists

# Discover all .sql dumps and restore each to a corresponding .sqlite file.
# e.g. memory/dumps/memfacta.sql → memory/memfacta.sqlite
- name: Find SQL dump files
  find:
    paths: "{{ openclaw_data_dir }}/state-repos/{{ _repo_hash_map[item.item.state_repo] }}/{{ item.item.state_path }}/memory/dumps"
    patterns: "*.sql"
  register: _sql_dumps
  loop: "{{ _memory_dirs.results }}"
  when: item.stat is defined and item.stat.exists

- name: Check if sqlite3 is installed
  command: which sqlite3
  register: _sqlite3_check
  changed_when: false
  failed_when: false

- name: Install sqlite3 via Pipelock
  when: _sqlite3_check.rc != 0
  block:
    - name: Configure apt proxy
      copy:
        content: |
          Acquire::http::Proxy "http://{{ pipelock.listen }}";
          Acquire::https::Proxy "http://{{ pipelock.listen }}";
        dest: /etc/apt/apt.conf.d/90pipelock
        mode: "0644"

    - name: Install sqlite3
      apt:
        name: sqlite3
        state: present
        update_cache: true

    - name: Remove apt proxy config
      file:
        path: /etc/apt/apt.conf.d/90pipelock
        state: absent

- name: Build flat list of SQL dumps to restore
  set_fact:
    _all_sql_dumps: >-
      {{ _sql_dumps.results
         | selectattr('files', 'defined')
         | map(attribute='files')
         | flatten
         | list }}

- name: Restore agent memory databases
  shell: |
    sqlite3 {{ item.path | regex_replace('/dumps/([^/]+)\.sql$', '/\1.sqlite') }} \
      < {{ item.path }}
  args:
    creates: "{{ item.path | regex_replace('/dumps/([^/]+)\\.sql$', '/\\1.sqlite') }}"
  become_user: openclaw
  loop: "{{ _all_sql_dumps }}"

- name: Report agent state
  debug:
    msg: "Agent '{{ item.name | default(item.id) }}' workspace linked from {{ item.state_path | default('(none)') }}"
  loop: "{{ openclaw_agents }}"
