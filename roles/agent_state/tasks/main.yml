---
- name: Collect unique agent state repos
  set_fact:
    _agent_repos: "{{ openclaw_agents | selectattr('state_repo', 'defined') | map(attribute='state_repo') | unique | list }}"

- name: Create state-repos directory
  file:
    path: "{{ openclaw_data_dir }}/state-repos"
    state: directory
    owner: openclaw
    group: openclaw
    mode: "0750"
  when: _agent_repos | length > 0

# Convert git@github.com:org/repo.git to https://github.com/org/repo.git
# so traffic routes through Pipelock (SSH egress is blocked by nftables).
# Authentication uses the GitHub token from vault via git credential helper.
- name: Convert SSH URLs to HTTPS
  set_fact:
    _agent_repos_https: >-
      {{ _agent_repos | map('regex_replace',
         '^git@github\.com:(.*)$',
         'https://github.com/\1') | list }}

- name: Configure git credential helper for clone
  copy:
    content: |
      #!/bin/sh
      case "$1" in
        Username*) echo "x-access-token" ;;
        Password*) echo "{{ vault_github_token }}" ;;
      esac
    dest: "{{ openclaw_data_dir }}/state-repos/.git-credential-helper"
    owner: openclaw
    group: openclaw
    mode: "0700"
  when: _agent_repos | length > 0 and vault_github_token | default('') != ''
  no_log: true

- name: Clone agent state repos
  command: >
    git -c http.proxy=http://{{ pipelock.listen }} clone
    --branch main --single-branch
    {{ item }}
    {{ openclaw_data_dir }}/state-repos/{{ item | hash('md5') }}
  args:
    creates: "{{ openclaw_data_dir }}/state-repos/{{ item | hash('md5') }}"
  become_user: openclaw
  environment:
    GIT_ASKPASS: "{{ openclaw_data_dir }}/state-repos/.git-credential-helper"
  loop: "{{ _agent_repos_https }}"

- name: Pull latest agent state
  command: >
    git -c http.proxy=http://{{ pipelock.listen }} pull --ff-only
  args:
    chdir: "{{ openclaw_data_dir }}/state-repos/{{ item | hash('md5') }}"
  become_user: openclaw
  environment:
    GIT_ASKPASS: "{{ openclaw_data_dir }}/state-repos/.git-credential-helper"
  register: _git_pull
  changed_when: "'Already up to date' not in _git_pull.stdout"
  loop: "{{ _agent_repos_https }}"

- name: Remove credential helper
  file:
    path: "{{ openclaw_data_dir }}/state-repos/.git-credential-helper"
    state: absent

- name: Create per-agent directories
  file:
    path: "{{ openclaw_data_dir }}/agents/{{ item.id }}"
    state: directory
    owner: openclaw
    group: openclaw
    mode: "0750"
  loop: "{{ openclaw_agents }}"
  loop_control:
    label: "{{ item.id }}"
  when: item.state_repo is defined

# Symlinks use the HTTPS URL hash (not SSH) since that's what we cloned with
- name: Build repo URL map (SSH → HTTPS hash)
  set_fact:
    _repo_hash_map: >-
      {{ dict(_agent_repos | zip(_agent_repos_https | map('hash', 'md5') | list)) }}

- name: Link agent workspaces
  file:
    src: "{{ openclaw_data_dir }}/state-repos/{{ _repo_hash_map[item.state_repo] }}/{{ item.state_path }}/workspace"
    dest: "{{ openclaw_data_dir }}/agents/{{ item.id }}/workspace"
    state: link
    owner: openclaw
    group: openclaw
  loop: "{{ openclaw_agents }}"
  loop_control:
    label: "{{ item.id }}"
  when: item.state_repo is defined and item.state_path is defined

- name: Check legacy memory sidecar queue at workspace root
  stat:
    path: "{{ openclaw_data_dir }}/state-repos/{{ _repo_hash_map[item.state_repo] }}/{{ item.state_path }}/workspace/.memory-queue"
  register: _memory_queue_workspace
  loop: "{{ openclaw_agents }}"
  loop_control:
    label: "{{ item.id }}"
  vars:
    _agent_memory_enabled: "{{ (item.memory | default({})).enabled | default(openclaw_memory.enabled | default(false)) }}"
  when:
    - item.state_repo is defined
    - item.state_path is defined
    - _agent_memory_enabled | bool
    - (openclaw_memory.scaffold.enabled | default(true)) | bool

- name: Check legacy memory sidecar queue at agent root
  stat:
    path: "{{ openclaw_data_dir }}/state-repos/{{ _repo_hash_map[item.state_repo] }}/{{ item.state_path }}/.memory-queue"
  register: _memory_queue_agent_root
  loop: "{{ openclaw_agents }}"
  loop_control:
    label: "{{ item.id }}"
  vars:
    _agent_memory_enabled: "{{ (item.memory | default({})).enabled | default(openclaw_memory.enabled | default(false)) }}"
  when:
    - item.state_repo is defined
    - item.state_path is defined
    - _agent_memory_enabled | bool
    - (openclaw_memory.scaffold.enabled | default(true)) | bool

- name: Fail if legacy memory sidecar queue is present
  fail:
    msg: >-
      Agent '{{ item.item.id }}' still has legacy .memory-queue at {{ item.stat.path | default(item.invocation.module_args.path | default('unknown path')) }}.
      Native active-memory/dreaming replaces the queue; remove or migrate it before enabling openclaw_memory.
  loop: "{{ (_memory_queue_workspace.results | default([])) + (_memory_queue_agent_root.results | default([])) }}"
  loop_control:
    label: "{{ item.item.id | default('unknown') }}"
  when:
    - item.stat is defined
    - item.stat.exists | default(false)
    - (openclaw_memory.scaffold.sidecar_queue_policy | default('fail')) == 'fail'

- name: Warn if legacy memory sidecar queue is present
  debug:
    msg: >-
      Agent '{{ item.item.id }}' still has legacy .memory-queue at {{ item.stat.path | default(item.invocation.module_args.path | default('unknown path')) }}.
      Native active-memory/dreaming should not run beside the queue.
  loop: "{{ (_memory_queue_workspace.results | default([])) + (_memory_queue_agent_root.results | default([])) }}"
  loop_control:
    label: "{{ item.item.id | default('unknown') }}"
  when:
    - item.stat is defined
    - item.stat.exists | default(false)
    - (openclaw_memory.scaffold.sidecar_queue_policy | default('fail')) == 'warn'

- name: Ensure native memory state directories exist
  file:
    path: "{{ openclaw_data_dir }}/state-repos/{{ _repo_hash_map[item.state_repo] }}/{{ item.state_path }}/memory/.dreams"
    state: directory
    owner: openclaw
    group: openclaw
    mode: "0750"
  loop: "{{ openclaw_agents }}"
  loop_control:
    label: "{{ item.id }}"
  vars:
    _agent_memory_enabled: "{{ (item.memory | default({})).enabled | default(openclaw_memory.enabled | default(false)) }}"
  when:
    - item.state_repo is defined
    - item.state_path is defined
    - _agent_memory_enabled | bool
    - (openclaw_memory.scaffold.enabled | default(true)) | bool

- name: Create bootstrap memory files only if absent
  copy:
    dest: "{{ openclaw_data_dir }}/state-repos/{{ _repo_hash_map[item.0.state_repo] }}/{{ item.0.state_path }}/workspace/{{ item.1.name }}"
    content: "{{ item.1.content }}"
    force: false
    owner: openclaw
    group: openclaw
    mode: "0640"
  loop: "{{ openclaw_agents | product(_aineko_bootstrap_files) | list }}"
  loop_control:
    label: "{{ item.0.id }}:{{ item.1.name }}"
  vars:
    _agent_memory_enabled: "{{ (item.0.memory | default({})).enabled | default(openclaw_memory.enabled | default(false)) }}"
    _aineko_bootstrap_files:
      - name: "AGENTS.md"
        content: |
          # Agent Operating Notes

          Use memory deliberately. Before answering questions about prior work, people, dates, preferences, or decisions, search memory first when the tool is available.

          Keep durable updates in the daily log using tools/aineko-flush.sh when available. Treat SOUL.md, IDENTITY.md, USER.md, TOOLS.md, HEARTBEAT.md, and MEMORY.md as read-mostly bootstrap context.
      - name: "SOUL.md"
        content: |
          # Soul

          Be direct, careful, and useful. Preserve continuity without inventing certainty. Keep private memory private.
      - name: "IDENTITY.md"
        content: |
          # Identity

          This agent is a persistent OpenClaw workspace with memory, tools, and a human-curated hot context file.
      - name: "USER.md"
        content: |
          # User

          Record stable user preferences and profile facts here only after they are durable and useful.
      - name: "TOOLS.md"
        content: |
          # Tools

          Prefer native memory_search and memory_get for recall. Keep credentials outside the workspace. Use host-managed credential transport instead of writing secrets into files.
      - name: "HEARTBEAT.md"
        content: |
          # Heartbeat

          On heartbeat, inspect current obligations, check memory health, and append durable updates to the canonical daily log with tools/aineko-flush.sh when needed. Do not consume or maintain a legacy .memory-queue sidecar.
  when:
    - item.0.state_repo is defined
    - item.0.state_path is defined
    - _agent_memory_enabled | bool
    - (openclaw_memory.scaffold.enabled | default(true)) | bool
    - (openclaw_memory.scaffold.create_bootstrap_files | default(true)) | bool

- name: Create hot MEMORY.md only if absent
  copy:
    dest: "{{ openclaw_data_dir }}/state-repos/{{ _repo_hash_map[item.state_repo] }}/{{ item.state_path }}/workspace/MEMORY.md"
    content: |
      # Long-Term Memory

      Human-curated hot context. Keep this file small and stable. Automated promotions should land in memory/promoted.md for review.

      <!-- OPENCLAW_CACHE_BOUNDARY -->

      ## Action Log

      Append irreversible external actions here with timestamps. Do not compact this section automatically.
    force: false
    owner: openclaw
    group: openclaw
    mode: "0640"
  loop: "{{ openclaw_agents }}"
  loop_control:
    label: "{{ item.id }}"
  vars:
    _agent_memory_enabled: "{{ (item.memory | default({})).enabled | default(openclaw_memory.enabled | default(false)) }}"
  when:
    - item.state_repo is defined
    - item.state_path is defined
    - _agent_memory_enabled | bool
    - (openclaw_memory.scaffold.enabled | default(true)) | bool
    - (openclaw_memory.scaffold.create_memory_md | default(true)) | bool

- name: Create tier-2 warm memory files only if absent
  copy:
    dest: "{{ openclaw_data_dir }}/state-repos/{{ _repo_hash_map[item.0.state_repo] }}/{{ item.0.state_path }}/memory/{{ item.1.name }}"
    content: "{{ item.1.content }}"
    force: false
    owner: openclaw
    group: openclaw
    mode: "0640"
  loop: "{{ openclaw_agents | product(_aineko_tier2_files) | list }}"
  loop_control:
    label: "{{ item.0.id }}:{{ item.1.name }}"
  vars:
    _agent_memory_enabled: "{{ (item.0.memory | default({})).enabled | default(openclaw_memory.enabled | default(false)) }}"
    _aineko_tier2_files:
      - name: "tier2-matt-personal.md"
        content: |
          # Tier 2: Matt Personal

          Warm personal context that should be searchable or loaded on demand, not injected every turn.
      - name: "tier2-projects.md"
        content: |
          # Tier 2: Projects

          Warm project context, decisions, open threads, and deeper implementation notes.
      - name: "tier2-research.md"
        content: |
          # Tier 2: Research

          Warm research notes and findings that are useful but too bulky for hot memory.
      - name: "tier2-insights.md"
        content: |
          # Tier 2: Insights

          Durable patterns, lessons, and operating heuristics awaiting curation.
      - name: "tier2-moltbook.md"
        content: |
          # Tier 2: Moltbook

          Warm moltbook and self-development notes. Keep hot memory lean; curate only stable summaries upward.
  when:
    - item.0.state_repo is defined
    - item.0.state_path is defined
    - _agent_memory_enabled | bool
    - (openclaw_memory.scaffold.enabled | default(true)) | bool
    - (openclaw_memory.scaffold.create_tier2_files | default(true)) | bool

- name: Create promoted memory review file only if absent
  copy:
    dest: "{{ openclaw_data_dir }}/state-repos/{{ _repo_hash_map[item.state_repo] }}/{{ item.state_path }}/memory/promoted.md"
    content: |
      # Promoted Memory Review

      Machine-generated durable memory candidates land here. Review and curate only selected facts into workspace/MEMORY.md.
    force: false
    owner: openclaw
    group: openclaw
    mode: "0640"
  loop: "{{ openclaw_agents }}"
  loop_control:
    label: "{{ item.id }}"
  vars:
    _agent_memory_enabled: "{{ (item.memory | default({})).enabled | default(openclaw_memory.enabled | default(false)) }}"
  when:
    - item.state_repo is defined
    - item.state_path is defined
    - _agent_memory_enabled | bool
    - (openclaw_memory.scaffold.enabled | default(true)) | bool
    - (openclaw_memory.scaffold.create_promoted_md | default(true)) | bool

- name: Create today's memory log only if absent
  copy:
    dest: "{{ openclaw_data_dir }}/state-repos/{{ _repo_hash_map[item.state_repo] }}/{{ item.state_path }}/memory/{{ ansible_facts['date_time']['date'] }}.md"
    content: |
      # {{ ansible_facts['date_time']['date'] }}

    force: false
    owner: openclaw
    group: openclaw
    mode: "0640"
  loop: "{{ openclaw_agents }}"
  loop_control:
    label: "{{ item.id }}"
  vars:
    _agent_memory_enabled: "{{ (item.memory | default({})).enabled | default(openclaw_memory.enabled | default(false)) }}"
  when:
    - item.state_repo is defined
    - item.state_path is defined
    - _agent_memory_enabled | bool
    - (openclaw_memory.scaffold.enabled | default(true)) | bool
    - (openclaw_memory.scaffold.create_daily_log | default(true)) | bool

- name: Ensure workspace tools directory exists
  file:
    path: "{{ openclaw_data_dir }}/state-repos/{{ _repo_hash_map[item.state_repo] }}/{{ item.state_path }}/workspace/tools"
    state: directory
    owner: openclaw
    group: openclaw
    mode: "0750"
  loop: "{{ openclaw_agents }}"
  loop_control:
    label: "{{ item.id }}"
  vars:
    _agent_memory_enabled: "{{ (item.memory | default({})).enabled | default(openclaw_memory.enabled | default(false)) }}"
    _create_recall_tool: "{{ openclaw_memory.scaffold.create_recall_tool | default(true) }}"
    _create_flush_tool: "{{ openclaw_memory.scaffold.create_flush_tool | default(true) }}"
  when:
    - item.state_repo is defined
    - item.state_path is defined
    - _agent_memory_enabled | bool
    - (openclaw_memory.scaffold.enabled | default(true)) | bool
    - _create_recall_tool | bool or _create_flush_tool | bool

- name: Create agy brute-force recall helper only if absent
  copy:
    src: "aineko-recall.sh"
    dest: "{{ openclaw_data_dir }}/state-repos/{{ _repo_hash_map[item.state_repo] }}/{{ item.state_path }}/workspace/tools/aineko-recall.sh"
    force: false
    owner: openclaw
    group: openclaw
    mode: "0750"
  loop: "{{ openclaw_agents }}"
  loop_control:
    label: "{{ item.id }}"
  vars:
    _agent_memory_enabled: "{{ (item.memory | default({})).enabled | default(openclaw_memory.enabled | default(false)) }}"
  when:
    - item.state_repo is defined
    - item.state_path is defined
    - _agent_memory_enabled | bool
    - (openclaw_memory.scaffold.enabled | default(true)) | bool
    - (openclaw_memory.scaffold.create_recall_tool | default(true)) | bool

- name: Create append-only memory flush helper only if absent
  copy:
    src: "aineko-flush.sh"
    dest: "{{ openclaw_data_dir }}/state-repos/{{ _repo_hash_map[item.state_repo] }}/{{ item.state_path }}/workspace/tools/aineko-flush.sh"
    force: false
    owner: openclaw
    group: openclaw
    mode: "0750"
  loop: "{{ openclaw_agents }}"
  loop_control:
    label: "{{ item.id }}"
  vars:
    _agent_memory_enabled: "{{ (item.memory | default({})).enabled | default(openclaw_memory.enabled | default(false)) }}"
  when:
    - item.state_repo is defined
    - item.state_path is defined
    - _agent_memory_enabled | bool
    - (openclaw_memory.scaffold.enabled | default(true)) | bool
    - (openclaw_memory.scaffold.create_flush_tool | default(true)) | bool

- name: Check for shared knowledge directory
  stat:
    path: "{{ openclaw_data_dir }}/state-repos/{{ _agent_repos_https[0] | hash('md5') }}/shared"
  register: _shared_dir
  when: _agent_repos | length > 0

- name: Link shared knowledge
  file:
    src: "{{ openclaw_data_dir }}/state-repos/{{ _agent_repos_https[0] | hash('md5') }}/shared"
    dest: "{{ openclaw_data_dir }}/shared"
    state: link
    owner: openclaw
    group: openclaw
  when: _agent_repos | length > 0 and _shared_dir.stat.exists | default(false)

- name: Check for memory directory
  stat:
    path: "{{ openclaw_data_dir }}/state-repos/{{ _repo_hash_map[item.state_repo] }}/{{ item.state_path }}/memory"
  register: _memory_dirs
  loop: "{{ openclaw_agents }}"
  loop_control:
    label: "{{ item.id }}"
  when: item.state_repo is defined

- name: Link agent memory directories
  file:
    src: "{{ openclaw_data_dir }}/state-repos/{{ _repo_hash_map[item.item.state_repo] }}/{{ item.item.state_path }}/memory"
    dest: "{{ openclaw_data_dir }}/agents/{{ item.item.id }}/memory"
    state: link
    owner: openclaw
    group: openclaw
  loop: "{{ _memory_dirs.results }}"
  when: item.stat is defined and item.stat.exists

# Discover all .sql dumps and restore each to a corresponding .sqlite file.
# e.g. memory/dumps/memfacta.sql → memory/memfacta.sqlite
- name: Find SQL dump files
  find:
    paths: "{{ openclaw_data_dir }}/state-repos/{{ _repo_hash_map[item.item.state_repo] }}/{{ item.item.state_path }}/memory/dumps"
    patterns: "*.sql"
  register: _sql_dumps
  loop: "{{ _memory_dirs.results }}"
  when: item.stat is defined and item.stat.exists

- name: Check if sqlite3 is installed
  command: which sqlite3
  register: _sqlite3_check
  changed_when: false
  failed_when: false

- name: Install sqlite3 via Pipelock
  when: _sqlite3_check.rc != 0
  block:
    - name: Configure apt proxy
      copy:
        content: |
          Acquire::http::Proxy "http://{{ pipelock.listen }}";
          Acquire::https::Proxy "http://{{ pipelock.listen }}";
        dest: /etc/apt/apt.conf.d/90pipelock
        mode: "0644"

    - name: Install sqlite3
      apt:
        name: sqlite3
        state: present
        update_cache: true

    - name: Remove apt proxy config
      file:
        path: /etc/apt/apt.conf.d/90pipelock
        state: absent

- name: Build flat list of SQL dumps to restore
  set_fact:
    _all_sql_dumps: >-
      {{ (_sql_dumps.results | default([]))
         | selectattr('files', 'defined')
         | map(attribute='files')
         | flatten
         | list }}

# Dumps from SQLite 3.44+ may contain unistr() which older versions
# don't support. Pre-process to expand unistr('\u000a') to literal newlines.
- name: Restore agent memory databases
  shell: |
    python3 -c "
    import re, sys
    sql = open(sys.argv[1]).read()
    def expand(m):
        inner = m.group(1).replace(chr(92)+'u000a', chr(10))
        return chr(39) + inner + chr(39)
    sql = re.sub(r\"unistr\('((?:[^']|'')*?)'\)\", expand, sql)
    sys.stdout.write(sql)
    " {{ item.path }} \
      | sqlite3 {{ item.path | regex_replace('/dumps/([^/]+)\.sql$', '/\1.sqlite') }}
  args:
    creates: "{{ item.path | regex_replace('/dumps/([^/]+)\\.sql$', '/\\1.sqlite') }}"
  become_user: openclaw
  loop: "{{ _all_sql_dumps }}"

- name: Report agent state
  debug:
    msg: "Agent '{{ item.name | default(item.id) }}' workspace linked from {{ item.state_path | default('(none)') }}"
  loop: "{{ openclaw_agents }}"
  loop_control:
    label: "{{ item.id }}"
