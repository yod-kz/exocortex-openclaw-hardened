---
_openclaw_defaults:
  gateway_bind: "lan"
  gateway_port: 18789
  gateway_auth_mode: "password"

  sandbox:
    mode: "non-main"
    docker_network: "bridge"
    read_only_root: true
    memory: "2g"
    cpus: 2
    pids_limit: 256

  tools_profile: "messaging"
  fetch_proxy: "http://172.17.0.1:8888"

  max_concurrent: 4
  subagent_max_concurrent: 8
  compaction_mode: "safeguard"

  deny_commands:
    - "camera.snap"
    - "camera.clip"
    - "screen.record"
    - "contacts.add"
    - "calendar.add"
    - "reminders.add"
    - "sms.send"

openclaw_binary: "/home/openclaw/.local/bin/openclaw"

# Agent definitions — empty by default, defined in site config
openclaw_agents: []

# Safety default — prevents template failure when host_vars omits openclaw_channels.
# Legacy channel entries use camelCase keys (botToken, appToken, groupPolicy, etc.)
# matching the OpenClaw JSON schema. Agent-scoped channels use snake_case (bot_token).
openclaw_channels: {}

# Per-agent channel account defaults (used when agent defines slack/telegram block)
_agent_slack_defaults:
  mode: "socket"
  group_policy: "allowlist"
  streaming:
    mode: "partial"

_agent_telegram_defaults:
  dm_policy: "pairing"
  group_policy: "allowlist"
  streaming: "partial"
