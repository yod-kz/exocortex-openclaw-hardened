---
_openclaw_defaults:
  gateway_bind: "lan"
  gateway_port: 18789
  gateway_auth_mode: "password"

  sandbox:
    mode: "non-main"
    docker_network: "bridge"
    read_only_root: true
    memory: "2g"
    cpus: 2
    pids_limit: 256

  tools_profile: "messaging"
  fetch_proxy: "http://172.17.0.1:8888"

  max_concurrent: 4
  subagent_max_concurrent: 8
  compaction_mode: "safeguard"

  deny_commands:
    - "camera.snap"
    - "camera.clip"
    - "screen.record"
    - "contacts.add"
    - "calendar.add"
    - "reminders.add"
    - "sms.send"

openclaw_binary: "/home/openclaw/.local/bin/openclaw"

# Agent definitions — empty by default, defined in site config
openclaw_agents: []

# Safety default — prevents template failure when host_vars omits openclaw_channels.
# Legacy channel entries use camelCase keys (botToken, appToken, groupPolicy, etc.)
# matching the OpenClaw JSON schema. Agent-scoped channels use snake_case (bot_token).
openclaw_channels: {}

# Native OpenClaw memory stack. Disabled by default so existing deployments do
# not change behavior until a site opts in.
_openclaw_memory_defaults: &openclaw_memory_defaults
  enabled: false
  qmd:
    enabled: false
    command: "qmd"
    search_mode: "search"
    include_default_memory: true
    sessions:
      enabled: false
      retention_days: 14
    update:
      interval: "5m"
      debounce_ms: 15000
    limits:
      max_results: 6
      timeout_ms: 4000
    scope:
      default: "deny"
      rules:
        - action: "allow"
          match:
            chatType: "direct"
    paths: []
  active_memory:
    enabled: false
    agents: []
    allowed_chat_types:
      - "direct"
    query_mode: "recent"
    prompt_style: "balanced"
    timeout_ms: 15000
    max_summary_chars: 220
    persist_transcripts: false
    logging: true
    associative_recall:
      enabled: false
      intrusion_rate: 0.07
      max_snippets: 1
      max_snippet_chars: 240
      min_signal_count: 1
      min_score: 0
      max_age_days: 90
      include_promoted: false
      recency_half_life_days: 14
    qmd:
      search_mode: "inherit"
  dreaming:
    enabled: false
    frequency: "0 3 * * *"
    timezone: ""
    model: ""
    verbose_logging: false
    light:
      enabled: true
    rem:
      enabled: true
    deep:
      enabled: true
      promotion_target_path: "memory/promoted.md"
      limit: 10
      min_score: 0.8
      min_recall_count: 3
      min_unique_queries: 3
      max_age_days: 30
      max_promoted_snippet_tokens: 160
  scaffold:
    enabled: true
    create_bootstrap_files: true
    create_memory_md: true
    create_tier2_files: true
    create_promoted_md: true
    create_daily_log: true
    create_recall_tool: true
    create_flush_tool: true
    sidecar_queue_policy: "fail"

openclaw_memory: *openclaw_memory_defaults

# Additional OpenClaw route/ACP bindings appended after automatically generated
# per-agent channel account bindings.
openclaw_bindings: []

# Per-agent channel account defaults (used when agent defines slack/telegram block)
_agent_slack_defaults:
  mode: "socket"
  group_policy: "allowlist"
  streaming:
    mode: "partial"

_agent_telegram_defaults:
  dm_policy: "pairing"
  group_policy: "allowlist"
  streaming: "partial"
