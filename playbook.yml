---
# ═════════════════════════════════════════════════════════════
# OpenClaw Secure Deployment — Main Playbook
#
# Usage:
#   ansible-playbook playbook.yml --ask-become-pass
#   ansible-playbook playbook.yml --ask-become-pass --tags bootstrap
#   ansible-playbook playbook.yml --ask-become-pass --tags phase2
#   ansible-playbook playbook.yml --ask-become-pass --tags verify
#
# Prerequisites:
#   ansible-galaxy collection install -r requirements.yml
#
# Phases:
#   bootstrap: system prep — user, Docker, Node.js, OpenClaw binary
#   phase2:    docker_hardening, pipelock, nftables, llamafirewall
#   phase3:    openclaw_config, openclaw_service
#   verify:    posture verification
# ═════════════════════════════════════════════════════════════
- name: Secure OpenClaw Deployment
  hosts: agent_hosts
  become: true

  pre_tasks:
    # ── Merge role defaults with site config ─────────────────
    # Ansible does shallow dict override. These set_facts deep-merge
    # role defaults with site overrides so all roles see complete config.
    - name: Merge role defaults with site config
      set_fact:
        bootstrap: "{{ _bootstrap_defaults | default({}) | combine(bootstrap | default({}), recursive=True) }}"
        docker: "{{ _docker_defaults | default({}) | combine(docker | default({}), recursive=True) }}"
        pipelock: "{{ _pipelock_defaults | default({}) | combine(pipelock | default({}), recursive=True) }}"
        locksmith: "{{ _locksmith_defaults | default({}) | combine(locksmith | default({}), recursive=True) }}"
        llamafirewall: "{{ _llamafirewall_defaults | default({}) | combine(llamafirewall | default({}), recursive=True) }}"
        openclaw: "{{ _openclaw_defaults | default({}) | combine(openclaw | default({}), recursive=True) }}"
        ollama: "{{ _ollama_defaults | default({}) | combine(ollama | default({}), recursive=True) }}"
        network: "{{ network_defaults | default({}) | combine(network | default({}), recursive=True) }}"
      tags: [always]

    # ── Phase 1 prerequisite checks (skip when bootstrap runs) ──
    - name: Verify openclaw user exists (Phase 1 prerequisite)
      command: id openclaw
      changed_when: false
      when: not (bootstrap.enabled | default(true))
      tags: [always]

    - name: Verify Docker is running (Phase 1 prerequisite)
      systemd:
        name: docker
        state: started
      when: not (bootstrap.enabled | default(true))
      tags: [always]

  roles:
    # ── Phase 1: Bootstrap (replaces openclaw-ansible) ─────
    - role: bootstrap
      tags: [bootstrap, phase1]
      when: bootstrap.enabled | default(true)

    # ── Phase 2: Hardening ───────────────────────────────────
    - role: docker_hardening
      tags: [phase2, docker]

    - role: pipelock
      tags: [phase2, pipelock]

    - role: locksmith
      tags: [phase2, locksmith]
      when: locksmith.enabled | default(false)

    - role: nftables
      tags: [phase2, nftables]

    - role: llamafirewall
      tags: [phase2, llamafirewall]
      when: llamafirewall.enabled | default(false)

    # ── Phase 2b: Telemetry Stack ─────────────────────────────
    - role: otel_collector
      tags: [phase2, telemetry, otel]
      when: telemetry.enabled | default(false)

    - role: phoenix
      tags: [phase2, telemetry, phoenix]
      when: telemetry.enabled | default(false)

    - role: loki
      tags: [phase2, telemetry, loki]
      when: telemetry.enabled | default(false)

    - role: prometheus
      tags: [phase2, telemetry, prometheus]
      when: telemetry.enabled | default(false)

    - role: grafana
      tags: [phase2, telemetry, grafana]
      when: telemetry.enabled | default(false)

    - role: caddy
      tags: [phase2, telemetry, caddy]
      when: telemetry.enabled | default(false)

    # ── Phase 2c: Ollama (local embeddings) ────────────────────
    - role: ollama
      tags: [phase2, ollama]
      when: ollama.enabled | default(false)

    # ── Phase 3: OpenClaw Configuration ──────────────────────
    - role: openclaw_onboard
      tags: [phase3, onboard]

    - role: openclaw_config
      tags: [phase3, config]

    - role: openclaw_service
      tags: [phase3, service]

    - role: agent_state
      tags: [phase3, agents]
      when: openclaw_agents | default([]) | length > 0

  # Flush pending handlers (e.g. service restarts) before verification
  post_tasks:
    - meta: flush_handlers
      tags: [always]

  # Verification runs as a separate play so handler ordering is guaranteed
- name: Verify Host Posture
  hosts: agent_hosts
  become: true
  roles:
    - role: verify
      tags: [verify, service]
